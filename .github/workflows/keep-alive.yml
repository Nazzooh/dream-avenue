name: Supabase Keep Alive

on:
  schedule:
    # Runs every 3 days at midnight UTC
    - cron: '0 0 */3 * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "Error: SUPABASE_URL and SUPABASE_ANON_KEY secrets are not configured in the repository."
            exit 1
          fi
          
          # Hitting the system_health table to insert a ping log
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/system_health" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"ping_source": "github_action"}')
          
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Successfully pinged Supabase database. Status code: $STATUS"
          else
            echo "⚠️ Warning: Received unexpected status code $STATUS from Supabase."
            # We don't fail the workflow because even a 4xx error means the API was hit and activity was registered.
          fi
