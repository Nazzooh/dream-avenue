  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Dream Avenue Website</title>
      <!-- Primary Description (Google standard: 150–160 chars) -->
    <meta
      name="description"
      content="Dream Avenue Convention Center in Calicut offers a premium Modern venue for weddings, receptions, parties, and corporate events. Modern facilities, spacious hall, and elegant design."
    />

    <!-- Keywords (not used by Google, but okay for other engines) -->
    <meta
      name="keywords"
      content="Convention Center Calicut, Convention Center Feroke, Wedding Venue Calicut, Wedding Venue Feroke, Event Hall Calicut, Event Hall Feroke, Hall Calicut, Modern Venue Calicut"
    />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL (Important for SEO) -->
    <link rel="canonical" href="https://dream-avenue.in/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:title" content="Dream Avenue Convention Center | Modern Event Venue in Calicut" />
    <meta
      property="og:description"
      content="Premium Modern event venue in Calicut for weddings, receptions, and corporate events. Book your dream event today."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dream-avenue.in/" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:site_name" content="Dream Avenue Convention Center" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dream Avenue Convention Center" />
    <meta name="twitter:description" content="Premium luxury event venue in Calicut." />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Local Business Schema (HUGE ranking boost for local venue) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EventVenue",
        "name": "Dream Avenue Convention Center",
        "image": "https://dream-avenue.in/og-image.jpg",
        "url": "https://dream-avenue.in/",
        "telephone": "+91-8606206096",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Calicut",
          "addressLocality": "Kozhikode",
          "addressRegion": "Kerala",
          "addressCountry": "IN"
        },
        "description": "Premium Modern event venue in Calicut for weddings, receptions, parties, and corporate functions."
      }
    </script>

    <!-- Preconnect (performance boost for fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
      <link rel="icon" type="image/png" sizes="32x32" href="public/favicon-32x32.png" />
      <link rel="icon" type="image/png" sizes="16x16" href="public/favicon-16x16.png" />
      <link rel="apple-touch-icon" sizes="180x180" href="public/apple-touch-icon.png" />
      <link rel="icon" type="image/png" sizes="192x192" href="public/android-chrome-192x192.png" />
      <link rel="icon" type="image/png" sizes="512x512" href="public/android-chrome-512x512.png" />
      <link rel="manifest" href="public/site.webmanifest" />
          <!-- Theme Color -->
    <meta name="theme-color" content="#B6F500" />
    </head>

    <body>
      <div id="root"></div>
      <!-- Google Analytics -->
      <script async src="https://www.googletagmanager.com/gtag/js?id=G-HTHJL3BEBY"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-HTHJL3BEBY');
      </script>

      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
